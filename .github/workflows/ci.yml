name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore durable-doc.sln
      - name: Build
        run: dotnet build durable-doc.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test durable-doc.sln --configuration Release --no-build
